plans:
  - id: rudy-stress
    label: Slayer RUDY parity
    phases:
      - vector: rudy
        start_after_sec: 0
        weight: 1.0
        params:
          path_profile: default

  - id: slayer-l7-mix
    label: Slayer L7 mix (GET + POST + API + RUDY)
    phases:
      - vector: httpget
        start_after_sec: 0
        weight: 0.25
      - vector: httppost
        start_after_sec: 0
        weight: 0.25
      - vector: apiflood
        start_after_sec: 1
        weight: 0.25
      - vector: rudy
        start_after_sec: 2
        weight: 0.25

  - id: protocol-storm
    label: L7 POST + H2 + WS
    phases:
      - vector: httppost
        start_after_sec: 0
        weight: 0.4
      - vector: h2-rapid-reset
        start_after_sec: 2
        weight: 0.35
      - vector: ws-flood
        start_after_sec: 4
        weight: 0.25
        params:
          path_profile: websocket

  - id: h2-only
    label: HTTP/2 rapid reset only
    phases:
      - vector: h2-rapid-reset
        start_after_sec: 0
        weight: 1.0

  - id: ws-only
    label: WebSocket flood only
    phases:
      - vector: ws-flood
        start_after_sec: 0
        weight: 1.0
        params:
          path_profile: websocket

  - id: baseline
    label: L7 baseline flood
    phases:
      - vector: baseline
        start_after_sec: 0
        weight: 1.0
        params:
          path_profile: default

  - id: connection-exhaust
    label: Slow connection exhaustion (RUDY + slowloris)
    phases:
      - vector: rudy
        start_after_sec: 0
        weight: 0.6
      - vector: slowloris
        start_after_sec: 2
        weight: 0.4

  - id: slayer-mix
    label: Slayer-inspired L7 mix
    phases:
      - vector: httpget
        start_after_sec: 0
        weight: 0.2
      - vector: httppost
        start_after_sec: 0
        weight: 0.2
      - vector: apiflood
        start_after_sec: 1
        weight: 0.2
      - vector: rudy
        start_after_sec: 2
        weight: 0.2
      - vector: h2-rapid-reset
        start_after_sec: 3
        weight: 0.1
      - vector: slowloris
        start_after_sec: 4
        weight: 0.1

  - id: api-abuse
    label: API / GraphQL / WS / H2 abuse
    phases:
      - vector: apiflood
        start_after_sec: 0
        weight: 0.3
        params:
          path_profile: api
      - vector: graphql
        start_after_sec: 1
        weight: 0.2
      - vector: ws-flood
        start_after_sec: 2
        weight: 0.25
        params:
          path_profile: websocket
      - vector: h2-rapid-reset
        start_after_sec: 3
        weight: 0.25

  - id: wordpress-abuse
    label: WordPress heartbeat + POST + slowloris
    phases:
