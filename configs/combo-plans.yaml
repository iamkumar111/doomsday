          path_profile: wordpress
      - vector: slowloris
        start_after_sec: 2
        weight: 0.4

  - id: magento-abuse
    label: Magento catalog + API stress
    phases:
      - vector: catalog-search
        start_after_sec: 0
        weight: 0.4
      - vector: apiflood
        start_after_sec: 1
        weight: 0.3
        params:
          path_profile: api
      - vector: httppost
        start_after_sec: 2
        weight: 0.3
        params:
          path_profile: magento

  - id: shopify-abuse
    label: Shopify search + API flood
    phases:
      - vector: shopify-search
        start_after_sec: 0
        weight: 0.5
      - vector: apiflood
        start_after_sec: 1
        weight: 0.5
        params:
