vectors:
  - id: httpget
    label: HTTP GET flood
    aliases: [get]
    worker: l7-abuser
    redis_vector: l7-abuser
    protocol: http/1.1
    bench_id: l7-httpget
    capabilities:
      workers: true
      streams: true
      batch: true
      paths: true
      payload_profile: false
      proxy_file: true
    defaults:
      workers: 64
      streams: 4
      batch: 50
    path_profiles: [default]

  - id: httppost
    label: HTTP POST flood
    aliases: [post, httppost]
    worker: l7-abuser
    redis_vector: l7-abuser
    protocol: http/1.1
